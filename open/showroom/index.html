<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Vitrine…</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="../../style.css">
  <link rel="icon" type="image/png" href="../../favicon.png">
</head>
<body>
  <main>
    <section class="hero">
      <div class="container">
        <img src="../../icon.png" alt="Vitrine app icon" class="app-icon" width="96" height="96">
        <h1 id="open-title">Opening Vitrine…</h1>
        <p class="tagline" id="open-message">Taking you to the showroom.</p>

        <p class="field-hint hidden" id="open-manual">
          Nothing happened? <a id="open-manual-link" href="#">Continue in the web app.</a>
        </p>

        <div class="hidden" id="open-missing">
          <p class="subtitle">This link is missing the details needed to open it. Get Vitrine to follow links like this:</p>
          <div class="preorder-stores">
            <a href="https://apps.apple.com/app/id6761633925" class="store-badge" target="_blank" rel="noopener" aria-label="Pre-order Vitrine on the App Store">
              <img src="../../badge-pre-order-app-store.svg" alt="Pre-Order on the App Store" width="170" height="58">
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.joforsell.vitrine" class="store-badge store-badge-play" target="_blank" rel="noopener" aria-label="Pre-register for Vitrine on Google Play">
              <img src="../../badge-pre-register-google-play.svg" alt="Pre-register on Google Play" width="196" height="58">
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var handle = params.get("handle");
      if (!handle) {
        document.getElementById("open-title").textContent = "Link incomplete";
        document.getElementById("open-message").classList.add("hidden");
        document.getElementById("open-missing").classList.remove("hidden");
        return;
      }
      var target = "https://app.vitrineminis.com/u/" + encodeURIComponent(handle);
      var manualLink = document.getElementById("open-manual-link");
      manualLink.href = target;
      document.getElementById("open-manual").classList.remove("hidden");
      window.location.replace(target);
    })();
  </script>
</body>
</html>
