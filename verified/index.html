<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Verified — Vitrine</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" type="image/png" href="../favicon.png">
  <style>
    .verified-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .verified-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .verified-card h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .verified-card p {
      color: var(--color-text-muted);
      line-height: 1.6;
      font-size: 0.9375rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <header class="hero">
        <img src="../icon.png" alt="Vitrine app icon" class="app-icon" width="96" height="96">
        <h1>Vitrine</h1>
        <p class="tagline">For miniature painters</p>
      </header>

      <div class="verified-card">
        <div class="verified-icon">✓</div>
        <h2>Email verified</h2>
        <p>Your email address has been confirmed. You can close this page and head back to the app.</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-links">
        <a href="/terms/">Terms & Conditions</a>
        <a href="/privacy/">Privacy Policy</a>
      </div>
      <p class="footer-contact"><a href="mailto:contact@vitrineminis.com">contact@vitrineminis.com</a></p>
    </div>
  </footer>
</body>
</html>
