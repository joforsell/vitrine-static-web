<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitrine</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <main>
    <div class="container">
      <header class="hero">
        <img src="icon.png" alt="Vitrine app icon" class="app-icon" width="96" height="96">
        <h1>Vitrine</h1>
        <p class="tagline">For miniature painters</p>
        <p class="subtitle">Every brushstroke has a story. Soon you'll have a place to keep them all.</p>
      </header>

      <form id="signup-form">
        <!-- Honeypot — hidden from real users, bots fill it in -->
        <div aria-hidden="true" class="hp">
          <input type="text" name="company" tabindex="-1" autocomplete="off">
        </div>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <fieldset>
          <legend>Platform</legend>
          <div class="platform-picker">
            <label class="platform-option">
              <input type="radio" name="platform" value="ios" required>
              <span>iOS</span>
            </label>
            <label class="platform-option">
              <input type="radio" name="platform" value="android">
              <span>Android</span>
            </label>
            <label class="platform-option">
              <input type="radio" name="platform" value="both">
              <span>Both</span>
            </label>
          </div>
        </fieldset>

        <label class="toggle-label">
          <span>I'd like to join the beta</span>
          <input type="checkbox" id="beta" name="beta" value="yes">
          <span class="toggle"></span>
        </label>

        <button type="submit">Sign up</button>
      </form>

      <p id="success-message" class="success hidden">Thanks! We'll be in touch.</p>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
